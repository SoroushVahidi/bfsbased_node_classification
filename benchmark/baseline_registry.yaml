baselines:
  - method_name: GPRGNN
    source_repo_url: "https://github.com/jianhao2016/GPRGNN"
    paper_name: "Adaptive Universal Generalized PageRank Graph Neural Network"
    official_or_unofficial: true
    license_if_known: MIT
    expected_entrypoint: "benchmark/runners/run_gprgnn.py"
    expected_env_notes: "PyTorch >= 1.9, PyTorch Geometric >= 2.0"
    dataset_support:
      - cora
      - citeseer
      - pubmed
      - chameleon
      - squirrel
      - texas
      - cornell
      - wisconsin
      - actor
    status: wrapped
    blocker_notes: "Inline reimplementation using PyG sparse ops. No external repo clone needed."

  - method_name: GCNII
    source_repo_url: "https://github.com/chennnM/GCNII"
